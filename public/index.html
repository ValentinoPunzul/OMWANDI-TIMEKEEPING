<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chronos Flow | Premium Timekeeper</title>
  
  <!-- PWA Metadata and Colors -->
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="/styles.css?v=4.0">
  <style>
    /* Login Overlay Styles */
    #loginOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-base);
      background-image: var(--bg-gradient);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 90%;
      max-width: 400px;
      padding: 40px;
      text-align: center;
      border-radius: var(--radius-lg);
    }
    .login-logo {
      margin-bottom: 24px;
    }
    .login-title {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .login-subtitle {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .hidden {
      display: none !important;
    }
  </style>
</head>
<body class="dark-theme">

  <!-- Login Screen -->
  <div id="loginOverlay">
    <div class="login-card glass-container">
      <div class="login-logo">
        <svg class="brand-logo" viewBox="0 0 512 512" width="64" height="64">
          <circle cx="256" cy="256" r="160" fill="none" stroke="url(#loginLogoGrad)" stroke-width="24" />
          <defs>
            <linearGradient id="loginLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#c084fc" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 class="login-title">Welcome Back</h2>
      <p class="login-subtitle">Enter your employee number to access Chronos Flow.</p>
      <form id="loginForm">
        <div class="form-group">
          <input type="text" id="loginEmpNo" placeholder="Employee Number (e.g. E001)" required autofocus>
        </div>
        <button type="submit" class="btn primary" style="width: 100%; padding: 14px;">Sign In</button>
      </form>
      <p id="loginError" style="color: var(--accent-rose); font-size: 0.85rem; margin-top: 16px;" class="hidden">Invalid employee number. Please try again.</p>
    </div>
  </div>
  
  <!-- App Container Grid -->
  <div class="app-layout hidden" id="appLayout">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-container">
      <div class="brand">
        <div class="brand-text">
          <h1>Chronos</h1>
          <span class="badge neon-glow-text">Flow</span>
        </div>
      </div>

      <!-- Navigation Links -->
      <nav class="nav-menu">
        <button class="nav-item active" data-view="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Live Timer</span>
        </button>
        <button class="nav-item" data-view="projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>Projects</span>
        </button>
        <button class="nav-item" data-view="team">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Team</span>
        </button>
        <button class="nav-item" data-view="timesheets">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          <span>Timesheets</span>
        </button>
      </nav>

      <!-- App Status Footer -->
      <div class="sidebar-footer">
        <div class="status-indicator">
          <span class="status-dot online" id="statusDot"></span>
          <span class="status-text" id="statusText">Cloud Synced</span>
        </div>
        <button id="logoutBtn" class="btn outline" style="margin-top: 16px; width: 100%; font-size: 0.8rem;">Logout</button>
      </div>
    </aside>

    <!-- Main View Content Area -->
    <main class="main-content" id="mainContent">
      <!-- Views are dynamically injected here via app.js -->
    </main>
    
  </div>

  <!-- Notification Banner Container -->
  <div class="notification-container" id="notificationContainer"></div>

  <!-- Manual Log Modal (needed for startTimer fallback) -->
  <div class="modal-overlay" id="manualLogModal" style="display: none;"></div>

  <!-- Core Client Application Javascript File -->
  <script src="/app.js?v=4.0"></script>
</body>
</html>
