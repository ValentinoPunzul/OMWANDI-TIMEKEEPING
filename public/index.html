<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>OMWANDI Timekeeper | Portal</title>
  
  <meta name="theme-color" content="#1d4ed8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Montserrat:wght@600&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="/styles.css?v=5.2">
  <style>
    /* Premium Login Styles matching Screenshot exactly */
    #loginOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f4f7fa; 
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      color: #333;
    }
    .login-card { 
      width: 100%; max-width: 440px; padding: 40px; text-align: center;
      background: #ffffff; border-radius: 12px; border: 1px solid #e1e8f0;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
      position: relative;
    }
    .login-logo-container {
        width: 100%; max-width: 280px; height: 120px;
        margin: 0 auto 30px auto; display: flex; align-items: center; justify-content: center;
    }
    .login-logo { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .login-title { 
        font-family: 'Montserrat', sans-serif;
        font-size: 1.4rem; 
        font-weight: 600; /* Updated to 600 weight as requested */
        color: #000; 
        margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1.5px;
    }
    .form-group { text-align: left; margin-bottom: 24px; position: relative; }
    .form-label-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
    .form-label { 
        display: block; font-size: 0.85rem; font-weight: 600; 
        color: #000; text-transform: none;
    }
    .forgot-link { font-size: 0.85rem; color: #000; text-decoration: underline; cursor: pointer; }
    
    .login-input {
      width: 100%; padding: 14px 16px; font-size: 1rem;
      background: #ffffff; border: 1px solid #d1d9e6; border-radius: 8px;
      color: #333; outline: none; transition: border-color 0.2s;
    }
    .login-input::placeholder { color: #8fa3bf; }
    .login-input:focus { border-color: #2563eb; }
    
    .btn-login {
      width: 100%; padding: 16px; background: #0d6efd; color: #fff;
      border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
      margin-top: 10px; transition: 0.2s;
    }
    .btn-login:hover { background: #0b5ed7; }
    
    .auth-footer {
        margin-top: 40px; font-size: 0.75rem; font-weight: 700;
        color: #8fa3bf; letter-spacing: 1.5px; text-transform: uppercase;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body class="dark-theme">

  <!-- Sign In Screen -->
  <div id="loginOverlay">
    <div class="login-card">
      <div class="login-logo-container">
        <img src="/icons/logo.png" class="login-logo" alt="Omwandi Logo" onerror="this.src='/icons/logo.svg'">
      </div>
      <h1 class="login-title">OMWANDI TIMEKEEPER</h1>
      
      <form id="loginForm">
        <div class="form-group">
            <div class="form-label-row">
                <label class="form-label">Employee Number</label>
            </div>
            <input type="text" id="loginEmpNo" class="login-input" placeholder="e.g. 111" required autofocus>
        </div>
        <div class="form-group">
            <div class="form-label-row">
                <label class="form-label">Password</label>
                <span class="forgot-link" onclick="alert('Please contact Administrator to reset password.')">Forgot your password?</span>
            </div>
            <input type="password" id="loginPassword" class="login-input" placeholder="" required>
        </div>
        <button type="submit" class="btn-login">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3L15.5 7.5z"/></svg>
            Sign In to Portal
        </button>
      </form>
      <p id="loginError" style="color: #ef4444; font-size: 0.85rem; margin-top: 20px; font-weight: 500;" class="hidden">Invalid credentials. Please try again.</p>
      
      <div class="auth-footer">AUTHORIZED ACCESS ONLY</div>
    </div>
  </div>
  
  <div class="app-layout hidden" id="appLayout">
    <aside class="sidebar glass-container">
      <div class="brand" style="margin-bottom: 30px;">
        <div class="brand-text">
          <h1>OMWANDI <span class="badge neon-glow-text" style="font-size: 0.8rem; vertical-align: middle;">Timekeeper</span></h1>
        </div>
      </div>

      <div class="profile-card" id="activeProfileCard">
        <div class="profile-avatar" id="activeAvatar">--</div>
        <div class="profile-info">
          <div class="profile-name" id="activeName">---</div>
          <div class="profile-role" id="activeRole">---</div>
        </div>
      </div>

      <nav class="nav-menu">
        <button id="nav-dashboard" class="nav-item active" data-view="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button id="nav-timer" class="nav-item" data-view="timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Live Timer</span>
        </button>
        <button id="nav-projects" class="nav-item" data-view="projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>Projects</span>
        </button>
        <button id="nav-team" class="nav-item" data-view="team">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Team</span>
        </button>
        <button id="nav-timesheets" class="nav-item" data-view="timesheets">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Timesheets</span>
        </button>
        <button id="nav-settings" class="nav-item" data-view="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
      </nav>

      <div class="sidebar-footer" style="margin-top: auto;">
        <div class="status-indicator">
          <span class="status-dot online" id="statusDot"></span>
          <span class="status-text" id="statusText">Cloud Synced</span>
        </div>
        <button id="logoutBtn" class="btn outline" style="margin-top: 16px; width: 100%; font-size: 0.8rem;">Logout</button>
      </div>
    </aside>

    <main class="main-content" id="mainContent"></main>
  </div>

  <div class="notification-container" id="notificationContainer"></div>
  <script src="/app.js?v=5.2"></script>
</body>
</html>
