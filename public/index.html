<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Chronos Flow | Premium Timekeeper</title>
  
  <!-- PWA Metadata and Colors -->
  <meta name="theme-color" content="#6366f1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/logo.svg">
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- CSS Stylesheet -->
  <link rel="stylesheet" href="/styles.css?v=4.2">
  <style>
    /* Login Overlay Styles */
    #loginOverlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: var(--bg-base); background-image: var(--bg-gradient);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
    }
    .login-card { width: 90%; max-width: 400px; padding: 40px; text-align: center; border-radius: var(--radius-lg); }
    .hidden { display: none !important; }
    
    /* Profile Card Sidebar */
    .profile-card {
      display: flex; align-items: center; gap: 12px; padding: 16px;
      background: rgba(255,255,255,0.03); border-radius: var(--radius-md);
      margin-bottom: 24px; border: 1px solid var(--glass-border);
    }
    .profile-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
    .profile-info { flex: 1; overflow: hidden; }
    .profile-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .profile-role { font-size: 0.75rem; color: var(--text-muted); }
  </style>
</head>
<body class="dark-theme">

  <!-- Login Screen -->
  <div id="loginOverlay">
    <div class="login-card glass-container">
      <div class="login-logo" style="margin-bottom: 24px;">
        <svg class="brand-logo" viewBox="0 0 512 512" width="64" height="64">
          <circle cx="256" cy="256" r="160" fill="none" stroke="url(#loginLogoGrad)" stroke-width="24" />
          <defs>
            <linearGradient id="loginLogoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#c084fc" />
              <stop offset="100%" stop-color="#06b6d4" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h2 style="margin-bottom: 8px;">Welcome Back</h2>
      <p style="color: var(--text-muted); margin-bottom: 32px;">Enter your employee number to access Chronos Flow.</p>
      <form id="loginForm">
        <input type="text" id="loginEmpNo" placeholder="Employee Number (e.g. E001)" required style="width: 100%; padding: 12px; margin-bottom: 16px; border-radius: 8px; border: 1px solid var(--glass-border); background: rgba(0,0,0,0.2); color: #fff;">
        <button type="submit" class="btn primary" style="width: 100%; padding: 14px;">Sign In</button>
      </form>
      <p id="loginError" style="color: #ef4444; font-size: 0.85rem; margin-top: 16px;" class="hidden">Invalid employee number. Please try again.</p>
    </div>
  </div>
  
  <!-- App Container Grid -->
  <div class="app-layout hidden" id="appLayout">
    
    <!-- Sidebar -->
    <aside class="sidebar glass-container">
      <div class="brand" style="margin-bottom: 30px;">
        <div class="brand-text">
          <h1>Chronos <span class="badge neon-glow-text" style="font-size: 0.8rem; vertical-align: middle;">Flow</span></h1>
        </div>
      </div>

      <!-- Active User Profile Card -->
      <div class="profile-card" id="activeProfileCard">
        <div class="profile-avatar" id="activeAvatar" style="background: var(--accent-primary);">--</div>
        <div class="profile-info">
          <div class="profile-name" id="activeName">Loading...</div>
          <div class="profile-role" id="activeRole">---</div>
        </div>
      </div>

      <!-- Navigation Links -->
      <nav class="nav-menu">
        <button class="nav-item active" data-view="dashboard">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="timer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span>Live Timer</span>
        </button>
        <button class="nav-item" data-view="projects">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span>Projects</span>
        </button>
        <button class="nav-item" data-view="team">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Team</span>
        </button>
        <button class="nav-item" data-view="timesheets">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          <span>Timesheets</span>
        </button>
        <button class="nav-item" data-view="settings">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          <span>Settings</span>
        </button>
      </nav>

      <!-- App Status Footer -->
      <div class="sidebar-footer" style="margin-top: auto;">
        <div class="status-indicator">
          <span class="status-dot online" id="statusDot"></span>
          <span class="status-text" id="statusText">Cloud Synced</span>
        </div>
        <button id="logoutBtn" class="btn outline" style="margin-top: 16px; width: 100%; font-size: 0.8rem;">Logout</button>
      </div>
    </aside>

    <!-- Main View Content Area -->
    <main class="main-content" id="mainContent">
      <!-- Views are dynamically injected here via app.js -->
    </main>
    
  </div>

  <div class="notification-container" id="notificationContainer"></div>

  <!-- Core Client Application Javascript File -->
  <script src="/app.js?v=4.2"></script>
</body>
</html>
