<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Maskable View -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1b4b" />
      <stop offset="60%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>

    <!-- Glowing Accents -->
    <linearGradient id="neonIndigo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>

    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <linearGradient id="neonAmber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Outer Ring Gradient -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <!-- Neon Glow Filters -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Optional Background Plate for App Installers (Maskable Compliant) -->
  <rect width="100%" height="100%" rx="96" fill="url(#bgGrad)" />

  <g transform="translate(0, 0)" filter="url(#softShadow)">
    <!-- Outer Interactive Tracking Ring -->
    <circle cx="256" cy="256" r="160" fill="none" stroke="url(#ringGrad)" stroke-width="24" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
    
    <!-- Outer Track Dial Dots -->
    <circle cx="256" cy="96" r="6" fill="#f8fafc" />
    <circle cx="416" cy="256" r="6" fill="#f8fafc" />
    <circle cx="256" cy="416" r="6" fill="#f8fafc" />
    <circle cx="96" cy="256" r="6" fill="#f8fafc" />

    <!-- Stylized Glowing Hourglass & Flow Vector -->
    <!-- Top Bulge -->
    <path d="M190 180 C190 180, 200 235, 240 250 C200 265, 190 320, 190 320" fill="none" stroke="url(#neonIndigo)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Bottom Bulge (Completing Hourglass Symbolism) -->
    <path d="M322 180 C322 180, 312 235, 272 250 C312 265, 322 320, 322 320" fill="none" stroke="url(#neonCyan)" stroke-width="12" stroke-linecap="round" filter="url(#glow)"/>
    
    <!-- Hourglass Bases -->
    <line x1="180" y1="180" x2="332" y2="180" stroke="url(#neonIndigo)" stroke-width="14" stroke-linecap="round"/>
    <line x1="180" y1="320" x2="332" y2="320" stroke="url(#neonCyan)" stroke-width="14" stroke-linecap="round"/>

    <!-- Dynamic Flow Core (Glowing particle center) -->
    <circle cx="256" cy="250" r="14" fill="url(#neonAmber)" filter="url(#glow)" />
    <path d="M256 220 L256 280" stroke="url(#neonAmber)" stroke-width="6" stroke-linecap="round" stroke-dasharray="4 8" />

    <!-- Stylized Dynamic Swish (Represents rapid time tracking) -->
    <path d="M140 256 A116 116 0 0 1 330 160" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
